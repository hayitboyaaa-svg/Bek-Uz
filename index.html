<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUMO PAY PREMIUM</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

.container{
max-width:430px;
margin:auto;
padding:20px;
padding-bottom:120px;
}

.logo{
font-size:32px;
font-weight:800;
background:linear-gradient(to right,#FFD700,#caa300);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(135deg,#FFD700,#8b6508);
display:flex;
justify-content:center;
align-items:center;
font-weight:800;
color:black;
}

.card{
background:linear-gradient(135deg,#111,#1d1d1d);
padding:25px;
border-radius:30px;
border:1px solid rgba(255,215,0,.15);
box-shadow:0 0 40px rgba(255,215,0,.08);
position:relative;
overflow:hidden;
}

.card::before{
content:'';
position:absolute;
width:200px;
height:200px;
background:radial-gradient(circle,rgba(255,215,0,.15),transparent);
top:-70px;
right:-70px;
}

.balance-title{
color:#888;
font-size:14px;
}

.balance{
font-size:40px;
font-weight:800;
margin-top:10px;
}

.card-number{
margin-top:30px;
letter-spacing:4px;
font-size:18px;
color:#ddd;
}

.bottom-card{
margin-top:25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.humo{
font-size:24px;
font-weight:800;
color:#FFD700;
}

.actions{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:30px;
}

.action{
background:#111;
padding:18px 10px;
border-radius:22px;
text-align:center;
cursor:pointer;
transition:.3s;
border:1px solid rgba(255,215,0,.08);
}

.action:hover{
transform:translateY(-5px);
border-color:#FFD700;
}

.action img{
width:35px;
height:35px;
margin-bottom:10px;
}

.action p{
font-size:12px;
color:#ccc;
}

.section-title{
margin-top:35px;
margin-bottom:18px;
font-size:22px;
font-weight:700;
}

.services{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.service{
background:#111;
padding:20px;
border-radius:24px;
cursor:pointer;
transition:.3s;
border:1px solid rgba(255,215,0,.08);
}

.service:hover{
transform:scale(1.03);
border-color:#FFD700;
}

.service img{
width:40px;
height:40px;
}

.service h3{
margin-top:15px;
}

.service p{
font-size:13px;
color:#999;
margin-top:8px;
}

.transactions{
margin-top:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.transaction{
background:#111;
padding:18px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid rgba(255,215,0,.08);
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.circle{
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(135deg,#FFD700,#8b6508);
display:flex;
justify-content:center;
align-items:center;
font-weight:800;
color:black;
}

.green{
color:#00ff99;
font-weight:700;
}

.red{
color:#ff5577;
font-weight:700;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0a0a0a;
display:flex;
justify-content:space-around;
padding:15px 0;
border-top:1px solid rgba(255,215,0,.1);
z-index:999;
}

.nav-item{
font-size:13px;
text-align:center;
color:#888;
cursor:pointer;
}

.active{
color:#FFD700;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:9999;
overflow:auto;
}

.modal-content{
background:#111;
width:100%;
max-width:380px;
padding:25px;
border-radius:30px;
border:1px solid rgba(255,215,0,.15);
}

input{
width:100%;
padding:15px;
background:#1d1d1d;
border:none;
border-radius:14px;
margin-top:15px;
color:white;
font-size:15px;
}

button{
width:100%;
padding:15px;
border:none;
margin-top:18px;
border-radius:15px;
font-weight:700;
cursor:pointer;
background:#FFD700;
}

.close{
background:#222;
color:white;
}

.receipt{
background:linear-gradient(135deg,#fff8dc,#fff,#f6e7a1);
color:black;
padding:20px;
border-radius:20px;
margin-top:20px;
position:relative;
overflow:hidden;
}

.receipt::before{
content:'';
position:absolute;
width:200px;
height:200px;
background:radial-gradient(circle,rgba(255,215,0,.25),transparent);
top:-70px;
right:-70px;
}

.receipt-row{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

canvas{
width:100%;
background:#111;
border-radius:20px;
margin-top:20px;
}

.cards-scroll{
display:flex;
overflow-x:auto;
gap:15px;
padding-bottom:10px;
scrollbar-width:none;
}

.cards-scroll::-webkit-scrollbar{
display:none;
}

.single-card{
min-width:320px;
flex-shrink:0;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<div class="logo">HUMO PAY</div>
<div class="profile">A</div>
</div>

<div id="app"></div>

</div>

<div class="bottom-nav">

<div class="nav-item active" id="homeBtn" onclick="showPage('home')">
🏠<br>Home
</div>

<div class="nav-item" id="statsBtn" onclick="showPage('stats')">
📊<br>Statistika
</div>

<div class="nav-item" id="walletBtn" onclick="showPage('wallet')">
💳<br>Wallet
</div>

<div class="nav-item" id="profileBtn" onclick="showPage('profile')">
👤<br>Profil
</div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<h2 id="modalTitle">Title</h2>

<div id="modalBody"></div>

<button class="close" onclick="closeModal()">
Yopish
</button>

</div>

</div>

<script>

const app=document.getElementById('app');

let userBalance=12580000;

let cards=[
{
number:'9860123456782026',
holder:'ABDULLOH',
expire:'12/30',
cvv:'777'
}
];

function maskCard(card){
return card.substring(0,4)+' **** **** '+card.substring(12,16);
}

function updateBalance(){
const el=document.querySelector('.balance');
if(el){
el.innerHTML=userBalance.toLocaleString('ru-RU')+" so'm";
}
}

function isValidCard(card){
return /^\d{16}$/.test(card);
}

function isValidAbonent(a){
return /^\d{5,15}$/.test(a);
}

function active(btn){

document.querySelectorAll('.nav-item').forEach(el=>{
el.classList.remove('active');
});

document.getElementById(btn).classList.add('active');

}

function showPage(page){

if(page==="home"){

active('homeBtn');

app.innerHTML=`

<div class="cards-scroll">

${cards.map(card => `

<div class="card single-card">

<div class="balance-title">
Asosiy balans
</div>

<div class="balance">
${userBalance.toLocaleString('ru-RU')} so'm
</div>

<div class="card-number">
${maskCard(card.number)}
</div>

<div class="bottom-card">

<div>
<p style="color:#888;font-size:13px;">
CARD HOLDER
</p>

<h3 style="margin-top:5px;">
${card.holder}
</h3>
</div>

<div class="humo">
HUMO
</div>

</div>

</div>

`).join('')}

</div>

<div class="actions">

<div class="action" onclick="transferModal()">
<img src="https://cdn-icons-png.flaticon.com/512/5610/5610944.png">
<p>Transfer</p>
</div>

<div class="action" onclick="cardModal()">
<img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
<p>Karta</p>
</div>

<div class="action" onclick="simpleModal('QR To‘lov','QR orqali muvaffaqiyatli to‘lov amalga oshirildi')">
<img src="https://cdn-icons-png.flaticon.com/512/2721/2721297.png">
<p>QR</p>
</div>

<div class="action" onclick="simpleModal('NFC','NFC to‘lov bajarildi')">
<img src="https://cdn-icons-png.flaticon.com/512/483/483947.png">
<p>NFC</p>
</div>

</div>

<h2 class="section-title">
Kommunal To'lovlar
</h2>

<div class="services">

<div class="service" onclick="utilityModal('Elektr')">
<img src="https://cdn-icons-png.flaticon.com/512/3103/3103446.png">
<h3>Elektr</h3>
<p>Elektr energiyasi</p>
</div>

<div class="service" onclick="utilityModal('Gaz')">
<img src="https://cdn-icons-png.flaticon.com/512/2933/2933828.png">
<h3>Gaz</h3>
<p>Gaz xizmatlari</p>
</div>

<div class="service" onclick="utilityModal('Suv')">
<img src="https://cdn-icons-png.flaticon.com/512/728/728093.png">
<h3>Suv</h3>
<p>Suv ta'minoti</p>
</div>

<div class="service" onclick="utilityModal('Internet')">
<img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png">
<h3>Internet</h3>
<p>Internet providerlari</p>
</div>

</div>

`;

}

if(page==="stats"){

active('statsBtn');

app.innerHTML=`

<h2 class="section-title">
Statistika
</h2>

<canvas id="chart" width="350" height="220"></canvas>

`;

drawChart();

}

if(page==="wallet"){

active('walletBtn');

let walletHTML='';

cards.forEach((card,index)=>{

walletHTML+=`

<div class="service">

<img src="https://cdn-icons-png.flaticon.com/512/196/196578.png">

<h3>
${index+1}-KARTA
</h3>

<p style="margin-top:10px;">
${maskCard(card.number)}
</p>

<p style="margin-top:8px;color:#888;font-size:12px;">
Muddat: ${card.expire}
</p>

<button onclick="deleteCard('${card.number}')"
style="background:#ff4444;color:white;">
Kartani o‘chirish
</button>

</div>

`;

});

app.innerHTML=`

<h2 class="section-title">
Wallet
</h2>

<div class="services">
${walletHTML}
</div>

<button onclick="cardModal()">
+ Karta qo'shish
</button>

`;

}

if(page==="profile"){

active('profileBtn');

app.innerHTML=`

<h2 class="section-title">
Profil
</h2>

<div class="card">

<h2>ABDULLOH</h2>

<p style="margin-top:10px;color:#aaa;">
Premium foydalanuvchi
</p>

<p style="margin-top:20px;">
Cashback:
<span style="color:#FFD700;">
1 250 000 so'm
</span>
</p>

<button onclick="simpleModal('Profil','Profil yangilandi')">
Profilni tahrirlash
</button>

</div>

`;

}

updateBalance();

}

function openModal(title,body){

document.getElementById('modal').style.display='flex';

document.getElementById('modalTitle').innerHTML=title;

document.getElementById('modalBody').innerHTML=body;

}

function closeModal(){
document.getElementById('modal').style.display='none';
}

function simpleModal(title,text){

openModal(title,`

<div class="receipt">

<h3>${title}</h3>

<p style="margin-top:15px;">
${text}
</p>

</div>

`);

}

function transferModal(){

openModal('Pul O‘tkazish',`

<input type="text" id="fromCard"
placeholder="Jo'natuvchi karta">

<input type="text" id="toCard"
placeholder="Qabul qiluvchi karta">

<input type="number" id="amount"
placeholder="Summa">

<button onclick="makeTransfer()">
O'tkazish
</button>

`);

}

function makeTransfer(){

let from=document.getElementById('fromCard').value;
let to=document.getElementById('toCard').value;
let amount=parseInt(document.getElementById('amount').value);

if(!isValidCard(from)){
simpleModal('Xato','Jo‘natuvchi karta noto‘g‘ri');
return;
}

if(!isValidCard(to)){
simpleModal('Xato','Qabul qiluvchi karta noto‘g‘ri');
return;
}

if(amount<=0){
simpleModal('Xato','Summa noto‘g‘ri');
return;
}

let fee=Math.floor(amount*0.01);

let total=amount+fee;

if(total>userBalance){
simpleModal('Xato','Kartada mablag‘ yetarli emas');
return;
}

userBalance-=total;

let date=new Date().toLocaleString();

openModal('Transfer Chek',`

<div class="receipt">

<h3>HUMO PAY CHEK</h3>

<div class="receipt-row">
<span>Sana:</span>
<span>${date}</span>
</div>

<div class="receipt-row">
<span>Jo'natuvchi:</span>
<span>${maskCard(from)}</span>
</div>

<div class="receipt-row">
<span>Qabul qiluvchi:</span>
<span>${maskCard(to)}</span>
</div>

<div class="receipt-row">
<span>Summa:</span>
<span>${amount.toLocaleString()} so'm</span>
</div>

<div class="receipt-row">
<span>Komissiya:</span>
<span>${fee.toLocaleString()} so'm</span>
</div>

<hr style="margin:15px 0;">

<div class="receipt-row">
<b>Umumiy:</b>
<b>${total.toLocaleString()} so'm</b>
</div>

<div class="receipt-row">
<b>Qoldiq:</b>
<b>${userBalance.toLocaleString()} so'm</b>
</div>

</div>

`);

showPage('home');

}

function utilityModal(type){

openModal(type+' To‘lovi',`

<input type="text" id="abonent"
placeholder="Abonent raqami">

<input type="number" id="payAmount"
placeholder="To'lov summasi">

<button onclick="payUtility('${type}')">
To'lash
</button>

`);

}

function payUtility(type){

let abonent=document.getElementById('abonent').value;

let amount=parseInt(
document.getElementById('payAmount').value
);

if(!isValidAbonent(abonent)){
simpleModal('Xato','Abonent raqami noto‘g‘ri');
return;
}

if(amount<=0){
simpleModal('Xato','Summa noto‘g‘ri');
return;
}

if(amount>userBalance){
simpleModal('Xato','Kartada mablag‘ yetarli emas');
return;
}

userBalance-=amount;

let date=new Date().toLocaleString();

openModal(type+' Chek',`

<div class="receipt">

<h3>${type.toUpperCase()} CHEK</h3>

<div class="receipt-row">
<span>Sana:</span>
<span>${date}</span>
</div>

<div class="receipt-row">
<span>Abonent:</span>
<span>${abonent}</span>
</div>

<div class="receipt-row">
<span>Xizmat:</span>
<span>${type}</span>
</div>

<div class="receipt-row">
<span>To'lov:</span>
<span>${amount.toLocaleString()} so'm</span>
</div>

<hr style="margin:15px 0;">

<div class="receipt-row">
<b>Qoldiq:</b>
<b>${userBalance.toLocaleString()} so'm</b>
</div>

</div>

`);

showPage('home');

}

function cardModal(){

openModal('Karta Qo‘shish',`

<input type="text" id="newCard"
placeholder="16 xonali karta">

<input type="text" id="newExpire"
placeholder="MM/YY">

<input type="password" id="newCVV"
placeholder="CVV">

<button onclick="saveCard()">
Qo'shish
</button>

`);

}

function saveCard(){

let card=document.getElementById('newCard').value.trim();

let expire=document.getElementById('newExpire').value.trim();

let cvv=document.getElementById('newCVV').value.trim();

if(!/^\d{16}$/.test(card)){
simpleModal('Xato','Karta 16 xonali bo‘lishi kerak');
return;
}

if(!/^\d{2}\/\d{2}$/.test(expire)){
simpleModal('Xato','MM/YY format kiriting');
return;
}

if(!/^\d{3}$/.test(cvv)){
simpleModal('Xato','CVV 3 xonali bo‘lishi kerak');
return;
}

let alreadyExists = cards.some(c => c.number === card);

if(alreadyExists){
simpleModal('Xato','Bu karta oldin qo‘shilgan');
return;
}

cards.push({
number:card,
expire:expire,
cvv:cvv,
holder:'ABDULLOH'
});

closeModal();

showPage('wallet');

setTimeout(()=>{

simpleModal(
'Karta Qo‘shildi',
maskCard(card)
);

},300);

}

function deleteCard(number){

cards = cards.filter(
card=>card.number!==number
);

showPage('wallet');

simpleModal(
'Karta O‘chirildi',
'Karta muvaffaqiyatli o‘chirildi'
);

}

function drawChart(){

const canvas=document.getElementById('chart');

if(!canvas) return;

const ctx=canvas.getContext('2d');

const values=[120,180,100,160,90,200];

const colors=['#FFD700','#caa300','#ffcc00','#f5b800'];

for(let i=0;i<values.length;i++){

ctx.fillStyle=colors[i%colors.length];

ctx.fillRect(
i*55+20,
220-values[i],
35,
values[i]
);

}

}

showPage('home');

</script>

</body>
</html>
